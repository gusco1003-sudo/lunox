<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ts3pl - 루녹스 정산 및 재고 시스템 (Guest)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 p-2 sm:p-4 md:p-8 relative mt-4">

    <div id="cloudStatus" class="fixed top-0 left-0 w-full bg-yellow-500 text-white text-xs font-bold text-center py-1 z-50 transition-colors">
        🟡 서버 데이터 불러오는 중...
    </div>

    <div id="mainContent" class="max-w-5xl mx-auto bg-white p-3 sm:p-5 md:p-6 rounded-lg sm:rounded-xl shadow-lg mt-2" style="display:none;">
        <h1 class="text-lg sm:text-2xl font-bold text-gray-800 mb-3 sm:mb-6 flex items-center gap-2">📦 <span>루녹스(Lunox) 정산 시스템 (조회 전용)</span></h1>
        
        <div class="bg-gradient-to-br from-blue-700 to-indigo-800 rounded-xl p-4 sm:p-6 mb-4 sm:mb-6 text-white shadow-md">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-3 sm:mb-4 pb-3 border-b border-blue-600 gap-2">
                <h2 class="text-base sm:text-lg font-bold flex items-center gap-2 text-white">📊 월별 통합 정산</h2>
                <select id="monthSelector" onchange="handleMonthChange()" class="bg-blue-900 text-white font-bold border border-blue-500 rounded-md px-3 py-2 sm:py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer shadow-sm w-full sm:w-auto"></select>
            </div>
            <div class="mb-3 sm:mb-4">
                <h3 class="text-xs sm:text-sm font-semibold text-blue-200 mb-1">선택한 월 합산 매출 (총액)</h3>
                <div class="text-3xl sm:text-4xl font-extrabold leading-tight"><span id="monthlyTotalRevenue">0</span> <span class="text-base sm:text-xl font-normal opacity-80">원</span></div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-3 bg-black bg-opacity-20 p-3 sm:p-4 rounded-lg">
                <div onclick="openStorageModal()" class="flex justify-between sm:block items-center cursor-pointer hover:bg-black hover:bg-opacity-10 p-1.5 rounded-lg transition" title="클릭하시면 상세 일별 보관 내역을 보실 수 있습니다.">
                    <p class="text-xs text-blue-200 mb-0 sm:mb-1">📦 보관료 (700원/PLT·일) 🔍</p>
                    <p class="text-base sm:text-lg font-bold"><span id="monthlyStorageFee">0</span> 원</p>
                </div>
                <div onclick="openInOutModal('OUT')" class="flex justify-between sm:block items-center border-t sm:border-t-0 border-blue-600 border-opacity-30 pt-2 sm:pt-0 cursor-pointer hover:bg-black hover:bg-opacity-10 p-1.5 rounded-lg transition" title="클릭하시면 상세 출고 내역을 보실 수 있습니다.">
                    <p class="text-xs text-blue-200 mb-0 sm:mb-1">🚚 출고비 (작업+택배) 🔍</p>
                    <p class="text-base sm:text-lg font-bold"><span id="monthlyOutFee">0</span> 원</p>
                </div>
                <div onclick="openInOutModal('IN')" class="flex justify-between sm:block items-center border-t sm:border-t-0 border-blue-600 border-opacity-30 pt-2 sm:pt-0 cursor-pointer hover:bg-black hover:bg-opacity-10 p-1.5 rounded-lg transition" title="클릭하시면 상세 입고 내역을 보실 수 있습니다.">
                    <p class="text-xs text-blue-200 mb-0 sm:mb-1">📥 입고비 (40FT 하역) 🔍</p>
                    <p class="text-base sm:text-lg font-bold"><span id="monthlyInFee">0</span> 원</p>
                </div>
            </div>
        </div>

        <div class="mb-3 flex justify-between items-center gap-2">
            <h3 class="text-base sm:text-lg font-bold text-gray-800">📋 실시간 현재고</h3>
            <span class="text-xs bg-amber-50 px-3 py-1.5 rounded-md border border-amber-200 font-bold text-center" id="todayPltBadge">오늘 총 0 PLT</span>
        </div>

        <div class="hidden md:block overflow-x-auto mb-8">
            <table class="w-full text-left border-collapse bg-white border rounded-md">
                <thead><tr class="bg-gray-800 text-white text-sm"><th class="p-3">품목명</th><th class="p-3 text-center">현재고 (수량)</th><th class="p-3 text-center">규격 (1PLT)</th><th class="p-3 text-center">보관 PLT</th></tr></thead>
                <tbody id="inventoryTable" class="text-gray-700 divide-y"></tbody>
            </table>
        </div>
        <div id="inventoryCards" class="md:hidden grid grid-cols-1 gap-2 mb-5"></div>

        <div>
            <h3 class="text-base font-bold text-gray-800 mb-3">🔍 <span id="logTitleMonth" class="text-blue-600"></span> 입출고 상세 내역</h3>
            <div id="logContainer" class="bg-gray-50 p-2 sm:p-4 rounded-lg max-h-80 overflow-y-auto text-sm text-gray-600 border shadow-inner"></div>
        </div>
    </div>

    <div id="storageModal" style="display:none;" class="fixed inset-0 bg-black bg-opacity-60 items-center justify-center z-50 p-3">
        <div class="bg-white p-4 sm:p-6 rounded-xl w-full max-w-md max-h-[85vh] flex flex-col">
            <h2 id="storageModalTitle" class="text-lg font-bold mb-3 border-b pb-2">📋 일별 보관료 내역</h2>
            <div class="flex-1 overflow-y-auto mb-4">
                <table class="w-full text-left border-collapse text-sm">
                    <thead class="bg-gray-100 border-b">
                        <tr><th class="p-2">날짜</th><th class="p-2 text-center">보관량</th><th class="p-2 text-right">금액</th></tr>
                    </thead>
                    <tbody id="storageModalBody" class="divide-y"></tbody>
                </table>
            </div>
            <div class="flex justify-end pt-3 border-t"><button onclick="closeStorageModal()" class="bg-gray-200 px-4 py-1.5 rounded-md text-sm font-semibold">닫기</button></div>
        </div>
    </div>
    
    <div id="inOutModal" style="display:none;" class="fixed inset-0 bg-black bg-opacity-60 items-center justify-center z-50 p-3">
        <div class="bg-white p-4 sm:p-6 rounded-xl w-full max-w-md max-h-[85vh] flex flex-col">
            <h2 id="inOutModalTitle" class="text-lg font-bold mb-3 border-b pb-2">상세 내역</h2>
            <div class="flex-1 overflow-y-auto mb-4">
                <table class="w-full text-left border-collapse text-sm">
                    <thead class="bg-gray-100 border-b"><tr><th class="p-2 w-1/3">일시</th><th class="p-2">내역</th><th class="p-2 text-right">비용</th></tr></thead>
                    <tbody id="inOutModalBody" class="divide-y"></tbody>
                </table>
            </div>
            <div class="flex justify-end pt-3 border-t"><button onclick="closeInOutModal()" class="bg-gray-200 px-4 py-1.5 rounded-md text-sm font-semibold">닫기</button></div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://ts3pl-982ef-default-rtdb.firebaseio.com/lunox_data.json";
        
        let inventory = []; 
        let logs = []; 
        let dailyPltLog = {}; 
        let storageFeeRate = 700;
        let currentSelectedMonth = getFormattedDate().substring(0, 7);

        function getFormattedDate(d = new Date()) { 
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; 
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetch(FIREBASE_URL)
                .then(res => res.json())
                .then(data => {
                    if (data) {
                        inventory = data.inventory || [];
                        logs = data.logs || [];
                        dailyPltLog = data.dailyPltLog || {};
                    }
                    const status = document.getElementById('cloudStatus');
                    status.innerText = "🟢 데이터 동기화 완료";
                    status.classList.remove('bg-yellow-500'); 
                    status.classList.add('bg-emerald-500');
                    setTimeout(() => status.style.display = 'none', 2000);
                    
                    document.getElementById('mainContent').style.display = 'block';
                    setupMonths();
                    render();
                })
                .catch(err => {
                    console.error("데이터 로드 실패", err);
                    document.getElementById('cloudStatus').innerText = "🔴 서버 연결 실패";
                    document.getElementById('cloudStatus').classList.replace('bg-yellow-500', 'bg-red-500');
                });
        });

        function setupMonths() {
            const availableMonths = new Set([getFormattedDate().substring(0, 7)]); 
            logs.forEach(l => availableMonths.add(l.time.substring(0, 7))); 
            Object.keys(dailyPltLog).forEach(d => availableMonths.add(d.substring(0, 7)));
            
            const sortedMonths = Array.from(availableMonths).sort().reverse();
            if (!sortedMonths.includes(currentSelectedMonth)) currentSelectedMonth = sortedMonths[0];
            
            document.getElementById('monthSelector').innerHTML = sortedMonths.map(m => 
                `<option value="${m}" ${m === currentSelectedMonth ? 'selected' : ''}>${m.split('-')[0]}년 ${m.split('-')[1]}월 내역</option>`
            ).join('');
        }

        function handleMonthChange() { 
            currentSelectedMonth = document.getElementById('monthSelector').value; 
            render(); 
        }

        function render() {
            let totalPlt = 0;
            
            // 데스크탑 테이블 렌더링
            document.getElementById('inventoryTable').innerHTML = inventory.map(item => { 
                if(item.id === 'in_40ft') return '';
                const plt = Math.ceil(item.box / item.pltStd); 
                totalPlt += plt; 
                return `<tr class="border-b"><td class="p-3 font-bold">${item.name}</td><td class="p-3 text-center text-blue-600 font-bold">${item.box} 수량(BOX)</td><td class="p-3 text-center text-xs text-gray-500">${item.pltStd}수량</td><td class="p-3 text-center"><span class="bg-gray-100 px-3 py-1 rounded-full text-xs font-bold">${plt} PLT</span></td></tr>`; 
            }).join('');
            
            // 모바일 카드 렌더링
            document.getElementById('inventoryCards').innerHTML = inventory.map(item => { 
                if(item.id === 'in_40ft') return '';
                const plt = Math.ceil(item.box / item.pltStd); 
                return `<div class="bg-white border rounded p-3 mb-2"><div class="flex justify-between"><h4 class="font-bold">${item.name}</h4><span class="bg-gray-100 px-2 py-1 rounded text-xs font-bold">${plt} PLT</span></div><div class="flex gap-4 mt-2"><p class="text-sm font-bold text-blue-600">${item.box} 수량(BOX)</p></div></div>`; 
            }).join('');
            
            document.getElementById('todayPltBadge').innerText = `오늘 총 ${totalPlt} PLT`;
            document.getElementById('logTitleMonth').innerText = currentSelectedMonth.replace('-', '.');

            // 금액 정산 로직
            let mInFee = 0, mOutFee = 0, mStorageFee = 0;
            logs.forEach(log => { 
                if (log.time.startsWith(currentSelectedMonth)) { 
                    if (log.type === 'IN') mInFee += (log.fee||0); 
                    if (log.type === 'OUT') mOutFee += (log.fee||0); 
                }
            });
            Object.keys(dailyPltLog).forEach(dateKey => { 
                if (dateKey.startsWith(currentSelectedMonth)) mStorageFee += (dailyPltLog[dateKey]||0) * storageFeeRate; 
            });
            
            document.getElementById('monthlyStorageFee').innerText = mStorageFee.toLocaleString(); 
            document.getElementById('monthlyInFee').innerText = mInFee.toLocaleString(); 
            document.getElementById('monthlyOutFee').innerText = mOutFee.toLocaleString(); 
            document.getElementById('monthlyTotalRevenue').innerText = (mInFee + mOutFee + mStorageFee).toLocaleString();

            // 상세 내역(로그) 렌더링
            const filteredLogs = logs.filter(l => l.time.startsWith(currentSelectedMonth));
            document.getElementById('logContainer').innerHTML = filteredLogs.length === 0 ? 
                `<div class="p-4 text-center text-gray-400">내역 없음</div>` : 
                filteredLogs.map(log => { 
                    const isOut = log.type === 'OUT'; 
                    return `<div class="p-3 bg-white border-l-4 ${isOut?'border-blue-400':'border-green-400'} mb-2 rounded shadow-sm">
                                <div class="flex justify-between">
                                    <div>
                                        <p class="${isOut?'text-blue-700':'text-green-700'} font-bold text-sm">${log.text}</p>
                                        <p class="text-xs text-gray-500 mt-1">${log.time} <span class="text-indigo-500 font-bold ml-1 border bg-indigo-50 px-1 rounded">💰 ${(log.fee||0).toLocaleString()}원</span></p>
                                    </div>
                                </div>
                                ${log.memo ? `<p class="text-xs text-gray-600 mt-2 bg-gray-50 p-2 border rounded break-all leading-relaxed">📝 ${log.memo}</p>` : ''}
                            </div>`; 
                }).join('');
        }

        // 보관료 모달 열기/닫기
        function openStorageModal() { 
            const [year, month] = currentSelectedMonth.split('-'); 
            document.getElementById('storageModalTitle').innerText = `📊 ${year}년 ${parseInt(month)}월 보관비`; 
            
            const tbody = document.getElementById('storageModalBody'); 
            const sortedDates = Object.keys(dailyPltLog).filter(date => date.startsWith(currentSelectedMonth)).sort(); 
            
            if (sortedDates.length === 0) { 
                tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-500">데이터 없음</td></tr>`; 
            } else { 
                tbody.innerHTML = sortedDates.map(date => { 
                    const plt = dailyPltLog[date] || 0; 
                    const fee = plt * storageFeeRate; 
                    return `<tr class="border-b">
                                <td class="p-2 text-sm">${date}</td>
                                <td class="p-2 text-center font-bold text-gray-700">${plt} PLT</td>
                                <td class="p-2 text-right font-bold text-indigo-600">${fee.toLocaleString()} 원</td>
                            </tr>`; 
                }).join(''); 
            } 
            document.getElementById('storageModal').style.display = 'flex'; 
        }
        function closeStorageModal() { document.getElementById('storageModal').style.display = 'none'; }
        
        // 입/출고 모달 열기/닫기
        function openInOutModal(type) { 
            const [year, month] = currentSelectedMonth.split('-'); 
            document.getElementById('inOutModalTitle').innerText = type === 'IN' ? `📥 ${year}년 ${parseInt(month)}월 입고비 상세` : `🚚 ${year}년 ${parseInt(month)}월 출고비 상세`; 
            
            const tbody = document.getElementById('inOutModalBody'); 
            const filtered = logs.filter(l => l.time.startsWith(currentSelectedMonth) && l.type === type); 
            
            if (filtered.length === 0) { 
                tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-500">데이터 없음</td></tr>`; 
            } else { 
                tbody.innerHTML = filtered.map(log => 
                    `<tr class="border-b">
                        <td class="p-2 text-xs text-gray-500">${log.time.substring(5).replace(' ','<br>')}</td>
                        <td class="p-2 text-xs font-semibold">${log.text.replace(/\[입고\] |\[출고일괄\] |\[출고\] /g, '')}</td>
                        <td class="p-2 text-right font-bold text-indigo-600 whitespace-nowrap">${(log.fee||0).toLocaleString()}원</td>
                    </tr>`
                ).join(''); 
            } 
            document.getElementById('inOutModal').style.display = 'flex'; 
        }
        function closeInOutModal() { document.getElementById('inOutModal').style.display = 'none'; }
    </script>
</body>
</html>
